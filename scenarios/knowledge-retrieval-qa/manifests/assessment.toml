version = "0.1"
name = "knowledge-retrieval-qa"
mode = "offline"
provider_allowlist = [
  "runwarden.input.inspect",
  "runwarden.report.lint",
  "external.mcp.filesystem.read_file",
]

[[roots]]
name = "knowledge"
path = "/srv/runwarden/knowledge"

[actor]
id = "agent-knowledge"

[authorization]
id = "authz-knowledge"
state = "active"

[active_assessment]
enabled = true
