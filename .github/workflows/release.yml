name: Release Evidence

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      # pnpm/action-setup@v4.2.0
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 11.4.0
      # actions/setup-node@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: pnpm
      - run: cargo install cargo-deny --version 0.19.6 --locked
      - run: pnpm install --frozen-lockfile
      - run: RUNWARDEN_SKIP_ARTIFACT_BUNDLE=1 bash scripts/release_gate_local.sh
      - run: bash scripts/generate_artifacts.sh
      - run: bash scripts/artifact_leak_scan.sh
      - run: cargo build --workspace --release
      # actions/upload-artifact@v4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runwarden-${{ matrix.os }}-release-evidence
          path: |
            target/release/runwarden*
            target/release/runwarden-mcp*
            artifacts/**

  publish-release:
    needs: release-smoke
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/download-artifact@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
      # softprops/action-gh-release@v2
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: release-assets/**
